<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Acadamy Portal</title>
        <link href="webstyle.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="transparent.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="style1.css" rel="stylesheet">        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
<body>
    <div class="container-fluid mt-5 pt-5">
  <div class="row">

    <!-- LEFT: Profile Sidebar -->
    <div class="col-md-3">
      <div class="card text-center p-3">
        <img src="profile.jpg" class="rounded-circle mx-auto" width="100">
        <h4 class="mt-2">Srujan</h4>
        <p>AI & Data Science Student</p>
        <button class="btn btn-success btn-sm">Edit Profile</button>
      </div>

      <div class="card mt-3 p-3">
        <h6>Skills</h6>
        <span class="badge bg-success">Python</span>
        <span class="badge bg-primary">C++</span>
        <span class="badge bg-warning">DSA</span>
      </div>
    </div>

    <!-- RIGHT: Main Content -->
    <div class="col-md-9">

      <!-- Stats -->
      <div class="row text-center">
        <div class="col">
          <div class="card p-3">
            <h5>Problems Solved</h5>
            <h3>120</h3>
          </div>
        </div>
        <div class="col">
          <div class="card p-3">
            <h5>Rank</h5>
            <h3>1520</h3>
          </div>
        </div>
        <div class="col">
          <div class="card p-3">
            <h5>Certificates</h5>
            <h3>5</h3>
          </div>
        </div>
      </div>

      <!-- Progress Section -->
      <div class="card mt-4 p-3">
        <h5>Progress</h5>
        <div class="progress mb-2">
          <div class="progress-bar bg-success" style="width: 70%">Python</div>
        </div>
        <div class="progress mb-2">
          <div class="progress-bar bg-primary" style="width: 50%">C++</div>
        </div>
      </div>

      <!-- Badges -->
      <div class="card mt-4 p-3">
        <h5>Badges</h5>
        <span class="badge bg-dark">⭐ Problem Solver</span>
        <span class="badge bg-info">🔥 7 Day Streak</span>
      </div>

    </div>
  </div>
</div>
</html>

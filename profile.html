<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <title>My Acadamy Portal</title>
        <link href="webstyle.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="transparent.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="style1.css" rel="stylesheet">        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
<body>
        <div class="navbar fixed-top">
            <div class="logo"><a href="index.html">Neuro Academy</a></div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#course">Courses</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="#contact">Contact Us</a></li>
                <li><a href="profile.html">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="18" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                        </svg>
                    </a>
                </li>
            </ul>

        </div>  
    <div class="container-fluid mt-5 pt-5">
  <div class="row">

    <!-- LEFT: Profile Sidebar -->
    <div class="col-md-3">
      <div class="card text-center p-3">
        <img src="profile.jpg" class="rounded-circle mx-auto" width="100">
        <h4 class="mt-2">Username</h4>
        <p></p>
        <button class="btn btn-success btn-sm">Edit Profile</button>
      </div>

      <div class="card mt-3 p-3">
        <h6>Skills</h6>

      </div>
    </div>

    <!-- RIGHT: Main Content -->
    <div class="col-md-9">

      <!-- Stats -->
      <div class="row text-center">
        <div class="col">
          <div class="card p-3">
            <h5>Current Courses</h5>
            <h3>0</h3>
          </div>
        </div>
        <div class="col">
          <div class="card p-3">
            <h5>Rank</h5>
            <h3>0</h3>
          </div>
        </div>
        <div class="col">
          <div class="card p-3">
            <h5>Certificates</h5>
            <h3>0</h3>
          </div>
        </div>
      </div>

      <!-- Progress Section -->
      <div class="card mt-4 p-3">
        <h5>Progress</h5>
        <div class="progress mb-2">
          <div class="progress-bar bg-success" style="width: 0%">Python</div>
        </div>
        <div class="progress mb-2">
          <div class="progress-bar bg-primary" style="width: 0%">C++</div>
        </div>
      </div>

      <!-- Badges -->
      <div class="card mt-4 p-3">
        <h5>Badges</h5>
        <span class="badge bg-dark"></span>
        <span class="badge bg-info"></span>
      </div>

    </div>
  </div>
</div>
</html>

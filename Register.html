<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Neuro Academy</title>
        <link href="style1.css" rel="stylesheet">
        <link href="webstyle.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
<body>
    <div id="register" style="margin-top: 25px;" class="bg d-flex justify-content-center align-items-center vh-100">
        <form id="registerForm">
            <h2>Register/Login</h2>
            <label>Name</label>
            <input type="text" id="regName">
            <label>Email</label>
            <input type="email" id="regEmail"> 
            <label>Password</label>
            <input type="password" id="regPassword">
            <label>Confirm Password</label>
            <input type="password" id="regConfirmPassword">  
            <button class="mt-3" type="submit">Submit</button>
            <br>
        </form>
    </div>
    
</body>
</html>

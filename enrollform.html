<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll Page</title>
    <link href="style1.css" rel="stylesheet">
    <link href="webstyle.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div id="enroll" class="bg d-flex justify-content-center align-items-center vh-100">
        <form id="enrollForm">
            <h3>Course Enrollment Form</h3>           
            <label for="name">Full Name:</label>
            <input type="text" id="enrollName" name="name" placeholder="Your Name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="enrollEmail" name="email" placeholder="Your Email" required>
            
            <label for="phone">Phone:</label>
            <input type="tel" id="enrollPhone" name="phone" placeholder="Your Phone Number">
            
            <label for="course">Select Course:</label>
            <select class="mt-1" id="enrollCourse" name="course" required>
                <option value="">--Choose a Course--</option>
                <option value="webdev">Web Development</option>
                <option value="python">Python From Basics</option>
                <option value="dbms">DBMS</option>
                <option value="nature">Nature Study</option>
                <option value="dsa">Data Structures & Algorithms</option>
            </select>

            <label for="duration">Course Duration:</label><br>
            <select class="mt-1" id="enrollDuration" name="duration" required>
                <option value="">--Choose Duration--</option>
                <option value="8">8 Weeks</option>
                <option value="12">12 Weeks</option>
            </select>
            <button class="mt-3"  type="submit">Enroll Now</button>
        </form>
    </div>
</body>
</html>
